[env:t-display-s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

lib_deps =
  bodmer/TFT_eSPI

build_flags =
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DARDUINO_USB_MODE=1
  -DBOARD_HAS_PSRAM
  -DUSER_SETUP_LOADED
  -DUSE_HSPI_PORT
  -DST7789_DRIVER
  -DINIT_SEQUENCE_3
  -DCGRAM_OFFSET
  -DTFT_RGB_ORDER=TFT_RGB
  -DTFT_INVERSION_ON
  -DTFT_PARALLEL_8_BIT
  -DTFT_WIDTH=170
  -DTFT_HEIGHT=320
  -DTFT_CS=6
  -DTFT_DC=7
  -DTFT_RST=5
  -DTFT_WR=8
  -DTFT_RD=9
  -DTFT_D0=39
  -DTFT_D1=40
  -DTFT_D2=41
  -DTFT_D3=42
  -DTFT_D4=45
  -DTFT_D5=46
  -DTFT_D6=47
  -DTFT_D7=48
  -DTFT_BL=38
  -DTFT_BACKLIGHT_ON=HIGH
  -DLOAD_GLCD
  -DLOAD_FONT2
  -DLOAD_FONT4
  -DLOAD_GFXFF
  -DSMOOTH_FONT

board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.psram_type = opi
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
